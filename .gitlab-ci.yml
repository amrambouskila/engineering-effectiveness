# ============================================================
# Engineering Effectiveness — GitLab CI/CD Pipeline
# ============================================================
# Branch Strategy:
#   dev      -> active development. Feature branches merge here.
#   staging  -> pre-production validation. Merges from dev.
#   main     -> production-ready. Merges from staging. Tagged with semver.
# ============================================================
spec:
  inputs:
    bump:
      description: 'Semver bump type: patch (0.0.X), minor (0.X.0), or major (X.0.0). Leave empty to skip release.'
      default: ''
      options:
        - ''
        - 'patch'
        - 'minor'
        - 'major'
---

workflow:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: '$CI_COMMIT_MESSAGE =~ /^release: v.*/'
      when: never
    - when: always

stages:
  - lint
  - test
  - build
  - docker
  - release

# ============================================================
# Shared config: Node 20 with pnpm
# ============================================================
.node-setup:
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/.pnpm-store/
  before_script:
    - corepack enable
    - cd frontend
    - pnpm install --frozen-lockfile

# ============================================================
# Stage 1: Lint
# ============================================================
lint:
  stage: lint
  extends: .node-setup
  script:
    - pnpm lint
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(dev|staging|main)$/
    - if: $CI_COMMIT_BRANCH =~ /^(dev|staging|main)$/

# ============================================================
# Stage 2: Tests + Coverage (100% gate on scoring utils)
# ============================================================
test:
  stage: test
  extends: .node-setup
  script:
    - 'pnpm test -- --coverage --coverage.reporter=text --coverage.reporter=cobertura --reporter=default --reporter=junit --outputFile.junit=junit.xml'
  needs: [lint]
  coverage: '/All files[^|]*\|\s*([\d.]+)/'
  artifacts:
    when: always
    reports:
      junit: frontend/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(dev|staging|main)$/
    - if: $CI_COMMIT_BRANCH =~ /^(dev|staging|main)$/

# ============================================================
# Stage 3: Build (gated on tests)
# ============================================================
build:
  stage: build
  extends: .node-setup
  script:
    - pnpm build
  needs: [test]
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(dev|staging|main)$/
    - if: $CI_COMMIT_BRANCH =~ /^(dev|staging|main)$/

# ============================================================
# Stage 4: Docker Build
# ============================================================
docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  needs: [build]
  script:
    - docker build -t engineering-effectiveness:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(staging|main)$/

# ============================================================
# Manual Release Job
# ============================================================
release:
  stage: release
  needs: [docker]
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/.pnpm-store/
  before_script:
    - apk add --no-cache git
    - corepack enable
    - cd frontend
    - pnpm install --frozen-lockfile
  script:
    - 'git config user.name "gitlab-ci[bot]"'
    - 'git config user.email "gitlab-ci[bot]@noreply.gitlab.com"'
    - 'cd frontend && npm version $[[ inputs.bump ]] --no-git-tag-version'
    - 'VERSION=$(node -p "require(''./package.json'').version")'
    - 'echo "Bumped to v$VERSION ($[[ inputs.bump ]])"'
    - 'cd .. && git add frontend/package.json'
    - 'git commit -m "release: v$VERSION"'
    - 'git tag "v$VERSION"'
    - 'git push -o ci.skip "https://gitlab-ci-token:${RELEASE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:main --tags'
    - 'echo "RELEASE_VERSION=$VERSION" >> release.env'
  artifacts:
    reports:
      dotenv: release.env
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && "$[[ inputs.bump ]]" != ""
  allow_failure: false

release-create:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: release
      artifacts: true
  script:
    - echo "Creating release v$RELEASE_VERSION"
  release:
    tag_name: "v$RELEASE_VERSION"
    name: "v$RELEASE_VERSION"
    description: "Release v$RELEASE_VERSION"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && "$[[ inputs.bump ]]" != ""